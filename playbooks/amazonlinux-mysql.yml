---
# Install MariaDB (a MySQL-compatible drop-in) on SELECTED Amazon Linux servers.
#
#   ansible-playbook playbooks/amazonlinux-mysql.yml --limit db01
#   ansible-playbook playbooks/amazonlinux-mysql.yml -e target=role_db
#
# Amazon Linux 2023 ships MariaDB (mariadb105-server, service 'mariadb') in its
# CORE repos, so no external MySQL Community repo / public-internet download is
# required — keeping hardened, egress-restricted hosts on the internal supply
# chain and avoiding the temp-root-password dance MySQL Community imposes.
#
# If you specifically need Oracle MySQL, add its Community repo (ideally from an
# internal mirror rather than dev.mysql.com), then install mysql-community-server
# (service 'mysqld') and adjust the socket path below.

- name: Install and enable MariaDB (MySQL-compatible)
  hosts: "{{ target | default('distro_amazon') }}"
  gather_facts: true
  vars:
    # Root password from the single consolidated secret, resolved field-scoped
    # inline (see group_vars/all.yml note). Empty (default) skips the step.
    mysql_root_password: "{{ (lookup('amazon.aws.aws_secret', ansible_secret_name, region=aws_region) | from_json).mysql_root_password | default('', true) }}"
  tasks:
    - name: Skip non-RedHat-family hosts
      ansible.builtin.meta: end_host
      when: ansible_os_family != "RedHat"

    - name: Install MariaDB server and the Python client (for Ansible mysql modules)
      ansible.builtin.dnf:
        name:
          - mariadb105-server
          - python3-PyMySQL
        state: present

    - name: Ensure mariadb is started and enabled at boot
      ansible.builtin.service:
        name: mariadb
        state: started
        enabled: true

    - name: Set the MariaDB root password (switch root from unix_socket to password auth)
      community.mysql.mysql_user:
        name: root
        host: localhost
        password: "{{ mysql_root_password }}"
        # Fresh MariaDB root uses the unix_socket plugin (password ignored). Force
        # mysql_native_password so the supplied password actually authenticates.
        plugin: mysql_native_password
        login_unix_socket: /var/lib/mysql/mysql.sock
        # Idempotent across reruns: try the implicit socket admin first (before the
        # switch), then fall back to the password we just set.
        check_implicit_admin: true
        login_user: root
        login_password: "{{ mysql_root_password }}"
        state: present
      no_log: true
      when: mysql_root_password | length > 0
