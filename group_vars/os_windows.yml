---
# Connection settings for the Windows estate (group 'os_windows', keyed off tag OS).
ansible_connection: winrm
ansible_port: 5986                # HTTPS listener from Document 1 §7
ansible_winrm_transport: ntlm     # 'kerberos' if domain-joined; see §6
# Terraform stands up a self-signed WinRM listener and we connect by private IP,
# so cert validation must be 'ignore' for this lab. Use 'validate' with a
# trusted/ACM-issued cert (and connect by the matching DNS name) in production.
ansible_winrm_server_cert_validation: ignore
ansible_winrm_message_encryption: auto           # encrypt payload over NTLM/HTTP

# Credentials come from the single consolidated secret, resolved field-scoped and
# inline (not via a global bundle var — see the note in group_vars/all.yml).
# Nothing sensitive is stored in Git; ansible_password is automatically scrubbed
# from Ansible output/logs.
ansible_user: "{{ (lookup('amazon.aws.aws_secret', ansible_secret_name, region=aws_region) | from_json).winrm_username }}"
ansible_password: "{{ (lookup('amazon.aws.aws_secret', ansible_secret_name, region=aws_region) | from_json).winrm_password }}"
