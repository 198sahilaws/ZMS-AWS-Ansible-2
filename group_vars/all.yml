---
# Variables applied to every host in the estate.

# Path where the Ansible SSH private key is written. bootstrap.yml writes it here
# from the consolidated credentials secret (see ansible_credentials below).
# The Terraform keypair is RSA, so use a distro-neutral filename (not *_ed25519).
ansible_ssh_private_key_file: /etc/ansible/keys/ansible_rsa

# AWS region used by amazon.aws lookups (e.g. aws_secret) and the dynamic
# inventory. Single source of truth: set the AWS_REGION env var to override;
# defaults to eu-west-3. Override per environment in env_*.yml if needed.
aws_region: "{{ lookup('ansible.builtin.env', 'AWS_REGION') | default('eu-west-3', true) }}"

# --- Consolidated Ansible credentials secret ------------------------------
# Terraform (module.secrets) creates ONE secret per deployment, named
# <base>/ansible-credentials-<suffix>, holding a single JSON document:
#   { "ssh_private_key": "<PEM>", "winrm_username": "...", "winrm_password": "...",
#     "dsrm_password": "...", "domain_join_username": "...", ... }
#
# The dynamic name is handed to the control node by its cloud-init as the
# ANSIBLE_SECRET_NAME environment variable (Terraform and Ansible run on
# different machines, so the name crosses via the environment, not a file). A
# higher-precedence `ansible_secret_name` var (also injected by cloud-init into
# the vars file) overrides the env-var line below if present.
ansible_secret_name: "{{ lookup('ansible.builtin.env', 'ANSIBLE_SECRET_NAME') | default('', true) }}"

# NOTE: the decrypted secret is deliberately NOT bound to a global variable here.
# A single broadly-scoped `ansible_credentials` dict would put the SSH private key
# and every password in scope for every play (and one stray `debug: var=...` or
# `-vvv` dump would leak all of them). Instead each play resolves ONLY the field
# it needs, inline and at the point of use, e.g.:
#   "{{ (lookup('amazon.aws.aws_secret', ansible_secret_name, region=aws_region)
#        | from_json).winrm_password }}"
# See group_vars/os_windows.yml and the playbooks/*.yml vars blocks.
